<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixtape Snake</title>
    <link rel="stylesheet" href="style.css?v=fullscreen-tight-2" />
  </head>
  <body>
    <main class="console" aria-label="Mixtape Snake">
      <section class="screen">
        <div class="hud">
          <span>MIXTAPE SNAKE</span>
          <span id="score">00</span>
        </div>
        <canvas id="game" width="900" height="520"></canvas>
        <button id="restart" type="button" aria-label="Restart">RESET</button>
      </section>
      <section class="samples" aria-label="Eaten styles">
        <div class="samples-title">EATEN STYLES</div>
        <ol id="sample-list" class="sample-list"></ol>
      </section>
    </main>
    <script src="app.js?v=fullscreen-tight-2"></script>
  </body>
</html>
