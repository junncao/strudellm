<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixtape Breakout</title>
    <link rel="stylesheet" href="breakout.css?v=6" />
  </head>
  <body>
    <main class="console" aria-label="Mixtape Breakout">
      <section class="screen">
        <div class="hud">
          <span>MIXTAPE BREAKOUT</span>
          <span id="score">00</span>
        </div>
        <canvas id="game" width="900" height="520"></canvas>
        <button id="restart" type="button" aria-label="Restart">RESET</button>
      </section>
      <section class="samples" aria-label="Acquired styles">
        <div class="samples-title">ACQUIRED STYLES</div>
        <ol id="sample-list" class="sample-list"></ol>
      </section>
    </main>
    <script src="breakout.js?v=6"></script>
  </body>
</html>
